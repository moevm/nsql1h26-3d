services:
  db:
    image: mongo:8.2.5
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./service/backend
    container_name: backend_app
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - MONGO_URL=mongodb://db:27017
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./service/frontend
      args:
        - VITE_API_BASE=/api
    container_name: frontend_app
    restart: always
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data: